server:
  port: 8080

spring:
  application:
    name: smart-cityguard

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cityguard?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: MySql@2024!Root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 30000

  redis:
    host: localhost
    port: 6379
    password:
    database: 0

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.cityguard.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: cityguard2026secretkeyforjwt1234567890abcdef
  expiration: 86400

minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: password
  bucket-name: cityguard

knife4j:
  enable: true

logging:
  level:
    com.cityguard: debug
    org.springframework: info